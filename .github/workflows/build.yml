name: Build GiovaPlayer APK

on:
  push:
    branches: [main]
    paths:
      - 'media_hub_pro_max/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.3'

      - name: Install dependencies
        working-directory: media_hub_pro_max
        run: flutter pub get

      - name: Build Debug APK
        working-directory: media_hub_pro_max
        run: flutter build apk --debug

      - name: Build Release APK
        working-directory: media_hub_pro_max
        run: flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: giova-player-debug
          path: media_hub_pro_max/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: giova-player-release
          path: media_hub_pro_max/build/app/outputs/flutter-apk/app-release.apk
