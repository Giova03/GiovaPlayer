name: giova_player
description: "GiovaPlayer — Lecteur multimédia tout-en-un. Contact: giobamos03@gmail.com | WhatsApp: +22670698070"
publish_to: 'none'
version: 8.0.0+9

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  dynamic_color: ^1.7.0
  # Audio — just_audio only (no audio_service, 100% reliable)
  just_audio: ^0.9.39
  # Video
  video_player: ^2.9.2
  # Core
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  sqflite: ^2.3.3+2
  flutter_secure_storage: ^9.2.2
  wakelock_plus: ^1.2.8
  local_auth: ^2.3.0
  path: ^1.9.0
  # Crypto & encryption
  crypto: ^3.0.3
  encrypt: ^5.0.3
  # Image processing
  image: ^4.1.7
  # Networking
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
