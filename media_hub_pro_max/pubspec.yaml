name: giova_player
description: "GiovaPlayer — Lecteur multimédia tout-en-un. Audio, Vidéo, Galerie IA, Coffre-fort, Downloader, Outils."
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── ÉTAT & NAVIGATION ───
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1

  # ─── UI ───
  dynamic_color: ^1.7.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # ─── UTILITAIRES ───
  uuid: ^4.4.2
  intl: ^0.19.0
  logger: ^2.4.0
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.2
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/tflite/
